name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    if: github.repository == 'guillewan2/I-Wanna-Be-The-Flixel'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            name: Linux
            path: export/linux/bin
          - os: windows-latest
            target: windows
            name: Windows
            path: export/windows/bin
          - os: macos-latest
            target: mac
            name: macOS
            path: export/macos/bin 
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        if: matrix.target == 'mac'
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Setup Haxe environment
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4

      - name: Install system dependencies (Linux only)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev

      - name: Install Haxe dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui
          haxelib install hxcpp
          
      - name: Build project (Linux & Windows)
        if: matrix.target != 'mac'
        run: haxelib run lime build ${{ matrix.target }} -release -verbose
          
      - name: Build project (macOS Universal)
        if: matrix.target == 'mac'
        run: haxelib run lime build mac -release -verbose -D universal

      - name: Compress app bundle (macOS only)
        if: matrix.target == 'mac'
        run: |
          cd ${{ matrix.path }}
          zip -r macOS-Release.zip *.app

      - name: Upload artifact (Windows and Linux)
        if: matrix.target != 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.name }}
          path: ${{ matrix.path }}/*

      - name: Upload artifact (macOS)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.name }}
          path: ${{ matrix.path }}/macOS-Release.zip